<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuKind</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname;
        var base = "/";
        var parts = path.split("/").filter(Boolean);
        var toolIndex = parts.indexOf("tool");
        if (toolIndex > 0) {
          base = "/" + parts.slice(0, toolIndex).join("/") + "/";
        } else if (parts.length > 1 && (parts[1] === "pdf" || parts[1] === "image")) {
          base = "/" + parts[0] + "/";
        } else if (parts.length > 0 && parts[0] !== "pdf" && parts[0] !== "image" && parts[0] !== "tool") {
          base = "/" + parts[0] + "/";
        }
        var route = path + window.location.search + window.location.hash;
        window.location.replace(base + "?route=" + encodeURIComponent(route));
      })();
    </script>
  </body>
</html>
